<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dream Coding Workspace</title>
    
    <!-- PWA Meta Tags for Hiding Browser Header & URL Bar -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Dream Hub">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="display" content="standalone">
    <meta name="orientation" content="portrait">
    
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/606/606203.png">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/606/606203.png">

    <!-- Tailwind CSS (V4) -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: background 0.3s ease, color 0.3s ease;
        }
        .theme-dark {
            background: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 100%);
            color: #e2e8f0;
        }
        .theme-light {
            background: radial-gradient(circle at 50% 0%, #f8fafc 0%, #e2e8f0 100%);
            color: #0f172a;
        }
        .heading-font { font-family: 'Space Grotesk', sans-serif; }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-card { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both; }
        .pulse-soft { animation: customPulse 2s infinite ease-in-out; }
        @keyframes customPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.6; }
        }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="theme-dark min-h-screen antialiased pb-28 select-none">

    <!-- SECURITY GATE (Password: 2117) -->
    <div id="auth-gate" class="fixed inset-0 z-50 bg-slate-950 flex flex-col items-center justify-center px-6">
        <div class="max-w-sm w-full text-center space-y-6">
            <div class="h-16 w-16 bg-gradient-to-tr from-blue-600 to-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/20 mx-auto">
                <i class="fas fa-shield-alt text-white text-2xl"></i>
            </div>
            <div>
                <h2 class="heading-font text-xl font-bold text-white tracking-tight">Dream Coding Admin</h2>
                <p class="text-xs text-slate-400 mt-1">Please enter your master terminal PIN</p>
            </div>
            <div class="space-y-3">
                <input type="password" id="pin-field" maxlength="4" placeholder="••••" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-4 text-center text-xl font-mono text-white tracking-widest focus:outline-none focus:border-blue-500 transition-colors">
                <p id="error-msg" class="text-xs text-rose-500 font-semibold hidden"><i class="fas fa-exclamation-circle mr-1"></i> Invalid Authentication PIN</p>
            </div>
            <button onclick="verifyPIN()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-semibold text-sm py-3.5 rounded-xl shadow-md transition-transform active:scale-[0.98]">
                Unlock Dashboard
            </button>
        </div>
    </div>

    <!-- MAIN APP INTERFACE -->
    <div id="main-app" class="hidden">
        <!-- Premium Header -->
        <header class="sticky top-0 z-40 bg-slate-900/80 dark:bg-slate-950/80 backdrop-blur-md border-b border-slate-800 px-5 py-4 flex items-center justify-between">
            <div class="flex items-center gap-2.5">
                <div class="h-9 w-9 bg-gradient-to-tr from-blue-600 to-indigo-600 rounded-xl flex items-center justify-center shadow-md shadow-blue-500/20">
                    <i class="fas fa-code text-white text-base"></i>
                </div>
                <div>
                    <h1 class="heading-font text-lg font-bold tracking-tight text-white">Dream Coding</h1>
                    <p class="text-[10px] text-indigo-400 font-bold tracking-wider uppercase">Secure App Engine</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <!-- Theme Mode Toggle -->
                <button onclick="toggleThemeMode()" id="theme-btn" class="h-9 w-9 rounded-xl bg-slate-800 border border-slate-700 flex items-center justify-center text-amber-400 shadow-sm transition-transform active:scale-95">
                    <i class="fas fa-moon text-sm"></i>
                </button>
                <button onclick="playReminderSound()" class="h-9 w-9 rounded-xl bg-slate-800 border border-slate-700 flex items-center justify-center text-blue-400 shadow-sm transition-transform active:scale-95">
                    <i class="fas fa-volume-up text-sm"></i>
                </button>
            </div>
        </header>

        <main class="max-w-md mx-auto px-4 mt-6 space-y-6">
            <!-- TOMORROW'S AGENDA -->
            <section class="bg-slate-900 dark:bg-slate-950/40 rounded-3xl p-5 shadow-sm border border-slate-800 relative overflow-hidden animate-card">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-2">
                        <span class="flex h-2 w-2 rounded-full bg-blue-500 pulse-soft"></span>
                        <h2 class="heading-font text-sm font-bold uppercase tracking-wider text-slate-400">Tomorrow's Schedule</h2>
                    </div>
                    <span id="tomorrow-date" class="text-xs font-bold bg-slate-950 border border-slate-800 px-2.5 py-1 rounded-xl text-blue-400 font-mono"></span>
                </div>
                <div id="tomorrow-classes-container" class="space-y-3"></div>
            </section>

            <!-- BATCH CONTROL -->
            <section class="bg-slate-900 dark:bg-slate-950/40 rounded-3xl p-5 shadow-sm border border-slate-800 animate-card" style="animation-delay: 0.1s;">
                <h2 class="heading-font text-base font-bold text-white flex items-center gap-2 mb-4">
                    <i class="fas fa-sliders-h text-indigo-400 text-sm"></i> Batch Controller
                </h2>
                <form id="batch-form" class="space-y-4">
                    <input type="hidden" id="edit-day">
                    <input type="hidden" id="edit-index">
                    <div class="space-y-3">
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-[11px] font-bold uppercase tracking-wider text-slate-400 mb-1 ml-1">Day</label>
                                <select id="form-day" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm text-slate-200" required>
                                    <option value="Sunday">Sunday</option>
                                    <option value="Monday">Monday</option>
                                    <option value="Tuesday">Tuesday</option>
                                    <option value="Wednesday">Wednesday</option>
                                    <option value="Thursday">Thursday</option>
                                    <option value="Friday">Friday</option>
                                    <option value="Saturday">Saturday</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-[11px] font-bold uppercase tracking-wider text-slate-400 mb-1 ml-1">Time Slot</label>
                                <input type="text" id="form-time" placeholder="04:00 PM - 05:30 PM" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm font-mono text-white" required>
                            </div>
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold uppercase tracking-wider text-slate-400 mb-1 ml-1">Batch / Class Name</label>
                            <input type="text" id="form-batch" placeholder="e.g., BCA Python Basics" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm text-white" required>
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold uppercase tracking-wider text-slate-400 mb-1 ml-1">Lesson Roadmap (Comma Separated)</label>
                            <textarea id="form-lessons" rows="2" placeholder="e.g., Intro, Variables, Operators" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm text-white" required></textarea>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button type="submit" id="submit-btn" class="flex-1 bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-semibold text-sm py-3 rounded-xl shadow-md">
                            Save Configuration
                        </button>
                        <button type="button" id="cancel-btn" class="hidden bg-slate-800 border border-slate-700 text-slate-300 text-sm px-4 py-3 rounded-xl" onclick="resetForm()">
                            Cancel
                        </button>
                    </div>
                </form>
            </section>

            <!-- WEEKLY MATRIX -->
            <section class="bg-slate-900 dark:bg-slate-950/40 rounded-3xl p-5 shadow-sm border border-slate-800 animate-card" style="animation-delay: 0.2s;">
                <h2 class="heading-font text-base font-bold text-white flex items-center gap-2 mb-4">
                    <i class="fas fa-layer-group text-blue-400 text-sm"></i> Weekly Progress Matrix
                </h2>
                <div id="weekly-schedule-container" class="space-y-5"></div>
            </section>
        </main>
        
        <footer class="text-center text-slate-500 text-[10px] uppercase font-bold tracking-widest mt-8">
            🚀 Native PWA Engine • Dream Coding
        </footer>
    </div>

    <script>
        // Security Verification Configuration
        const ENCRYPTED_PIN = "2117";
        
        function verifyPIN() {
            const input = document.getElementById('pin-field').value;
            const errorMsg = document.getElementById('error-msg');
            
            if (input === ENCRYPTED_PIN) {
                document.getElementById('auth-gate').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                renderApp();
            } else {
                errorMsg.classList.remove('hidden');
                document.getElementById('pin-field').value = "";
                document.getElementById('pin-field').focus();
            }
        }

        // Support Enter Key Trigger for Security Gate
        document.getElementById('pin-field').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') verifyPIN();
        });

        // Theme Engine Configuration
        let currentTheme = localStorage.getItem('dreamCoding_Theme') || 'dark';
        
        function applyTheme(theme) {
            const body = document.body;
            const themeBtn = document.getElementById('theme-btn');
            if (theme === 'light') {
                body.className = "theme-light min-h-screen antialiased pb-28 select-none";
                themeBtn.innerHTML = `<i class="fas fa-sun text-sm"></i>`;
                themeBtn.className = "h-9 w-9 rounded-xl bg-white border border-slate-300 flex items-center justify-center text-amber-500 shadow-sm transition-transform active:scale-95";
            } else {
                body.className = "theme-dark min-h-screen antialiased pb-28 select-none";
                themeBtn.innerHTML = `<i class="fas fa-moon text-sm"></i>`;
                themeBtn.className = "h-9 w-9 rounded-xl bg-slate-800 border border-slate-700 flex items-center justify-center text-amber-400 shadow-sm transition-transform active:scale-95";
            }
        }

        function toggleThemeMode() {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            localStorage.setItem('dreamCoding_Theme', currentTheme);
            applyTheme(currentTheme);
        }

        // Data Store Engine
        const defaultSchedule = { "Sunday": [], "Monday": [], "Tuesday": [], "Wednesday": [], "Thursday": [], "Friday": [], "Saturday": [] };
        let schedule = JSON.parse(localStorage.getItem('dreamCoding_LessonTracker')) || defaultSchedule;
        const daysOfWeek = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];

        window.onload = function() {
            applyTheme(currentTheme);
            document.getElementById('pin-field').focus();
            
            // Inline Single-File Service Worker Registration for Standalone Launch Structure
            if ('serviceWorker' in navigator) {
                const pwaBlob = new Blob([`
                    self.addEventListener('fetch', function(e) {});
                `], { type: 'application/javascript' });
                const workerUrl = URL.createObjectURL(pwaBlob);
                navigator.serviceWorker.register(workerUrl).catch(err => console.log('PWA active'));
            }
        };

        function playReminderSound() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = "sine"; osc.frequency.value = 950;
            gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.15);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        }

        function saveToStorage() {
            localStorage.setItem('dreamCoding_LessonTracker', JSON.stringify(schedule));
            renderApp();
        }

        document.getElementById('batch-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const day = document.getElementById('form-day').value;
            const batch = document.getElementById('form-batch').value.trim();
            const time = document.getElementById('form-time').value.trim();
            const lessonsInput = document.getElementById('form-lessons').value;

            const lessonObjects = lessonsInput.split(',').map(t => t.trim()).filter(t => t.length > 0).map(t => ({ title: t, done: false }));
            const editDay = document.getElementById('edit-day').value;
            const editIndex = document.getElementById('edit-index').value;

            if(editDay && editIndex !== "") {
                const oldLessons = schedule[editDay][editIndex].lessons || [];
                const updatedLessons = lessonObjects.map(newL => {
                    const existing = oldLessons.find(oldL => oldL.title.toLowerCase() === newL.title.toLowerCase());
                    if (existing) newL.done = existing.done;
                    return newL;
                });
                if (editDay === day) {
                    schedule[day][editIndex] = { batch, time, lessons: updatedLessons };
                } else {
                    schedule[editDay].splice(editIndex, 1);
                    schedule[day].push({ batch, time, lessons: updatedLessons });
                }
            } else {
                schedule[day].push({ batch, time, lessons: lessonObjects });
            }
            saveToStorage();
            resetForm();
        });

        function editBatch(day, index) {
            const target = schedule[day][index];
            document.getElementById('form-day').value = day;
            document.getElementById('form-batch').value = target.batch;
            document.getElementById('form-time').value = target.time;
            document.getElementById('form-lessons').value = target.lessons.map(l => l.title).join(', ');
            document.getElementById('edit-day').value = day;
            document.getElementById('edit-index').value = index;
            document.getElementById('submit-btn').innerText = "Update Batch Hub";
            document.getElementById('cancel-btn').classList.remove('hidden');
        }

        function deleteBatch(day, index) {
            if(confirm("Delete this entire batch profile?")) {
                schedule[day].splice(index, 1);
                saveToStorage();
            }
        }

        function toggleLesson(day, batchIdx, lessonIdx) {
            schedule[day][batchIdx].lessons[lessonIdx].done = !schedule[day][batchIdx].lessons[lessonIdx].done;
            saveToStorage();
        }

        function resetForm() {
            document.getElementById('batch-form').reset();
            document.getElementById('edit-day').value = "";
            document.getElementById('edit-index').value = "";
            document.getElementById('submit-btn').innerText = "Save Configuration";
            document.getElementById('cancel-btn').classList.add('hidden');
        }

        function renderApp() {
            renderTomorrowBox();
            renderWeeklyOverview();
        }

        function renderTomorrowBox() {
            const today = new Date();
            const tomorrow = new Date(today);
            tomorrow.setDate(today.getDate() + 1);
            const tomorrowDayName = daysOfWeek[tomorrow.getDay()];
            
            document.getElementById('tomorrow-date').innerText = tomorrow.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
            const tomorrowClasses = schedule[tomorrowDayName] || [];
            const container = document.getElementById('tomorrow-classes-container');
            container.innerHTML = '';

            if (tomorrowClasses.length === 0) {
                container.innerHTML = `<div class="text-center py-6 text-slate-500 bg-slate-950/40 rounded-2xl border border-dashed border-slate-800 text-xs">No batches tomorrow.</div>`;
                return;
            }

            tomorrowClasses.forEach((c) => {
                const total = c.lessons.length;
                const completed = c.lessons.filter(l => l.done).length;
                const percentage = Math.round((completed / total) * 100) || 0;
                const nextTopic = c.lessons.find(l => !l.done)?.title || "Course Completed! 🎉";
                const whatsappText = `*Dream Coding Reminder* 💻\n\nHello students, here is your class details for tomorrow (${tomorrowDayName}).\n\n📚 *Batch:* ${c.batch}\n⏰ *Timing:* ${c.time}\n🎯 *Next Lesson:* ${nextTopic}\n📊 *Overall Progress:* ${percentage}% completed\n\nPlease be on time. Thank you!`;
                
                container.innerHTML += `
                    <div class="bg-slate-950/40 p-4 rounded-2xl border border-slate-800 space-y-3">
                        <div>
                            <h4 class="text-sm font-bold text-slate-300 dark:text-white tracking-tight">${c.batch}</h4>
                            <div class="text-[11px] text-slate-400 mt-1 font-mono"><i class="far fa-clock text-blue-400 mr-1"></i>${c.time}</div>
                        </div>
                        <div class="bg-slate-950/80 border border-slate-800 p-2.5 rounded-xl text-xs">
                            <div class="text-[10px] font-bold text-slate-500 uppercase">Targeting Next Topic:</div>
                            <div class="font-semibold text-indigo-400 mt-0.5">${nextTopic}</div>
                        </div>
                        <a href="https://api.whatsapp.com/send?text=${encodeURIComponent(whatsappText)}" target="_blank" class="w-full bg-slate-100 dark:bg-slate-200 text-slate-900 font-bold text-xs py-2.5 rounded-xl flex items-center justify-center gap-2 shadow-sm">
                            <i class="fab fa-whatsapp text-emerald-600 text-sm"></i> Push Reminders
                        </a>
                    </div>
                `;
            });
        }

        function renderWeeklyOverview() {
            const container = document.getElementById('weekly-schedule-container');
            container.innerHTML = '';

            daysOfWeek.forEach((day) => {
                const classes = schedule[day] || [];
                let classesHTML = '';

                if (classes.length === 0) {
                    classesHTML = `<p class="text-[11px] text-slate-500 italic pl-1">Rest Day</p>`;
                } else {
                    classes.forEach((c, idx) => {
                        const total = c.lessons.length;
                        const completed = c.lessons.filter(l => l.done).length;
                        const percentage = Math.round((completed / total) * 100) || 0;

                        let progressChecklistHTML = '';
                        c.lessons.forEach((lesson, lIdx) => {
                            progressChecklistHTML += `
                                <label class="flex items-center gap-2 text-[11px] bg-slate-950/60 border border-slate-800 p-2 rounded-lg cursor-pointer transition-all active:scale-[0.99]">
                                    <input type="checkbox" ${lesson.done ? 'checked' : ''} onchange="toggleLesson('${day}', ${idx}, ${lIdx})" class="w-3.5 h-3.5 accent-blue-500 rounded">
                                    <span class="${lesson.done ? 'line-through text-slate-500' : 'text-slate-300 font-medium'} truncate">${lesson.title}</span>
                                </label>
                            `;
                        });

                        classesHTML += `
                            <div class="bg-slate-950/30 p-3.5 rounded-2xl border border-slate-800 space-y-3">
                                <div class="flex justify-between items-start">
                                    <div class="truncate max-w-[70%]">
                                        <span class="font-bold text-slate-300 dark:text-white text-xs block truncate tracking-tight">${c.batch}</span>
                                        <span class="text-[10px] text-slate-400 font-mono flex items-center gap-1 mt-0.5"><i class="far fa-clock text-blue-400"></i>${c.time}</span>
                                    </div>
                                    <div class="flex gap-1">
                                        <button onclick="editBatch('${day}', ${idx})" class="h-6 w-6 text-slate-400 bg-slate-800 border border-slate-700 rounded-md flex items-center justify-center text-[10px]"><i class="fas fa-pencil-alt"></i></button>
                                        <button onclick="deleteBatch('${day}', ${idx})" class="h-6 w-6 text-slate-500 bg-slate-800 border border-slate-700 rounded-md flex items-center justify-center text-[10px]"><i class="fas fa-trash"></i></button>
                                    </div>
                                </div>
                                <div class="space-y-2 pt-2 border-t border-slate-800">
                                    <div class="flex justify-between items-center text-[9px] font-bold text-slate-500 tracking-wide">
                                        <span>LESSON TRACKER</span>
                                        <span class="text-blue-400 font-mono">${completed}/${total} DONE (${percentage}%)</span>
                                    </div>
                                    <div class="w-full bg-slate-800 h-1 rounded-full overflow-hidden">
                                        <div class="bg-gradient-to-r from-blue-500 to-indigo-500 h-1 rounded-full transition-all duration-300" style="width: ${percentage}%"></div>
                                    </div>
                                    <div class="grid grid-cols-1 gap-1 max-h-32 overflow-y-auto pt-1">
                                        ${progressChecklistHTML}
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                }
                container.innerHTML += `
                    <div class="space-y-2">
                        <span class="text-xs font-bold text-slate-400 heading-font block border-b border-slate-800/60 pb-1">${day}</span>
                        <div class="grid grid-cols-1 gap-2">${classesHTML}</div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
